name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - master # 只有合并到 master 分支时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Frontend dependencies
        run: pnpm install

      - name: Build Frontend
        run: pnpm run build

      - name: Install Backend dependencies
        run: |
          cd server
          pnpm install --production

      - name: Prepare Backend Dist
        run: |
          # 将构建好的前端移动到 server 目录下，方便容器访问
          mv dist server/

      - name: Copy Files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 包含 server 下的所有内容 (含进入其中的 dist)
          source: "server/**,scripts/deploy.sh"
          target: ${{ secrets.DEPLOY_PATH }}/server
          strip_components: 1

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}/server,DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          script: |
            # 路径对齐：脚本现在就在 server 目录下
            chmod +x ${{ secrets.DEPLOY_PATH }}/server/deploy.sh
            
            # 生成 .env 文件
            cat <<EOF > ${{ secrets.DEPLOY_PATH }}/server/.env
            DB_HOST=172.17.0.1
            DB_PORT=5432
            DB_NAME=GooseMarks
            DB_USER=GooseMarks
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            PORT=3001
            EOF
            
            ${{ secrets.DEPLOY_PATH }}/server/deploy.sh
